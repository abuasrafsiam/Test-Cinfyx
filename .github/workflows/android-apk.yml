name: Build Cinefyx APK (Debug)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js (required for Capacitor)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'

      # 3️⃣ Setup Java (required for Android build)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 5️⃣ Build web app
      - name: Build web app
        run: npm run build

      # 6️⃣ Sync Capacitor
      - name: Capacitor sync
        run: npx cap sync

      # 7️⃣ Build DEBUG APK (important!)
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # 8️⃣ Upload APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cinefyx-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
