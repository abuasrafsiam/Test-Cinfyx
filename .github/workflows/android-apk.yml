name: Build Cinefyx APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js (v22 LTS)
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          cache: 'npm'

      # 3️⃣ Setup Java for Gradle
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      # 4️⃣ Install dependencies
      - name: Install npm packages
        run: npm install

      # 5️⃣ Build web assets
      - name: Build Vite React app
        run: npm run build

      # 6️⃣ Sync Capacitor
      - name: Capacitor sync
        run: npx cap sync

      # 7️⃣ Optional: Copy Android icon/logo to res/mipmap
      - name: Copy Android logo
        run: |
          if [ -d "android/app/src/main/res/mipmap" ]; then
            cp -r ./android-logo-res/* android/app/src/main/res/
          fi

      # 8️⃣ Build Android APK
      - name: Build Android APK
        working-directory: android
        run: ./gradlew assembleRelease

      # 9️⃣ Upload APK artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cinefyx-release-apk
          path: android/app/build/outputs/apk/release/*.apk
